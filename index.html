<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKT Vibe-coding 예제 시현</title>
    <style>
        /* 전체 페이지 레이아웃 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
            overflow: hidden; /* 스크롤 중복 방지 */
        }

        /* 탭 버튼이 들어가는 상단 바 */
        .tab-bar {
            display: flex;
            background-color: #333;
            padding: 10px 10px 0 10px;
        }

        .tab-button {
            padding: 10px 25px;
            cursor: pointer;
            border: none;
            outline: none;
            background-color: #555;
            color: white;
            border-radius: 8px 8px 0 0;
            margin-right: 5px;
            transition: 0.3s;
        }

        .tab-button:hover {
            background-color: #777;
        }

        .tab-button.active {
            background-color: #fff;
            color: #000;
            font-weight: bold;
        }

        /* iframe이 들어가는 컨텐츠 영역 */
        .tab-content {
            display: none;
            width: 100%;
            height: calc(100vh - 50px); /* 상단 바 높이 제외 */
            border: none;
        }

        .tab-content.active {
            display: block;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* --- 팝업 모달 스타일 추가 --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6); /* 반투명 배경 */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999; /* 항상 최상단에 위치 */
        }

        .modal-content {
            background-color: #fff;
            width: 90%;
            max-width: 650px;
            height: 80%;
            max-height: 450px;
            border-radius: 10px;
            position: relative;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        /* 팝업 닫기 버튼 */
        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 28px;
            font-weight: bold;
            color: #333;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 10000;
        }

        .close-btn:hover {
            color: #ff0000;
        }

        .modal-iframe {
            width: 100%;
            height: 100%;
            border: none;
            padding-top: 20px; /* 닫기 버튼과 겹치지 않게 여백 추가 */
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div id="popupModal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn" onclick="closePopup()">&times;</button>
            <iframe src="notice.html" class="modal-iframe"></iframe>
        </div>
    </div>
    <div class="tab-bar">
        <button class="tab-button active" onclick="openTab(event, 'site1')">from Claude</button>
        <button class="tab-button" onclick="openTab(event, 'site2')">from GPT</button>
        <button class="tab-button" onclick="openTab(event, 'site3')">from Gemini</button>
    </div>

    <div id="site1" class="tab-content active">
        <iframe src="site1.html"></iframe>
    </div>

    <div id="site2" class="tab-content">
        <iframe src="site2.html"></iframe>
    </div>

    <div id="site3" class="tab-content">
        <iframe src="site3.html"></iframe>
    </div>

    <script>
        function openTab(evt, tabId) {
            const contents = document.getElementsByClassName("tab-content");
            for (let i = 0; i < contents.length; i++) {
                contents[i].classList.remove("active");
            }

            const buttons = document.getElementsByClassName("tab-button");
            for (let i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove("active");
            }

            document.getElementById(tabId).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        // --- 팝업 닫기 함수 추가 ---
        function closePopup() {
            document.getElementById('popupModal').style.display = 'none';
        }
    </script>

</body>
</html>
