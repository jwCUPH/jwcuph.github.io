<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKT Vibe-coding 예제 시현</title>
    <style>
        /* 전체 페이지 레이아웃 */
        body, html {
            margin: 0;
            padding: 0;
            height: 500%;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        /* 탭 버튼이 들어가는 상단 바 */
        .tab-bar {
            display: flex;
            background-color: #333;
            padding: 10px 10px 0 10px;
            align-items: flex-end; 
        }

        .tab-button {
            padding: 10px 25px;
            cursor: pointer;
            border: none;
            outline: none;
            background-color: #555;
            color: white;
            border-radius: 8px 8px 0 0;
            margin-right: 5px;
            transition: 0.3s;
        }

        .tab-button:hover {
            background-color: #777;
        }

        .tab-button.active {
            background-color: #fff;
            color: #000;
            font-weight: bold;
        }

        /* 알람(종) 모양 아이콘 버튼 스타일 */
        .notice-bell-btn {
            margin-left: auto;
            background: none;
            border: none;
            color: #f39c12; 
            cursor: pointer;
            padding: 10px 15px;
            margin-bottom: 5px; 
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s;
            outline: none;
        }

        .notice-bell-btn svg {
            width: 26px;
            height: 26px;
        }

        /* 종 달랑달랑 애니메이션 정의 */
        @keyframes ringing {
            0% { transform: scale(1.15) rotate(0deg); }
            25% { transform: scale(1.15) rotate(-15deg); }
            50% { transform: scale(1.15) rotate(0deg); }
            75% { transform: scale(1.15) rotate(15deg); }
            100% { transform: scale(1.15) rotate(0deg); }
        }

        /* 마우스 호버 시 무한 반복 */
        .notice-bell-btn:hover {
            color: #f1c40f; 
            animation: ringing 0.4s ease-in-out infinite;
        }

        /* --- 팝업 닫힐 때 강제로 종 울리는 클래스 --- */
        .notice-bell-btn.active-ring {
            color: #f1c40f; 
            animation: ringing 0.4s ease-in-out 2; /* 2번 흔들림 (총 0.8초) */
        }

        /* iframe이 들어가는 컨텐츠 영역 */
        .tab-content {
            display: none;
            width: 100%;
            height: calc(100vh - 50px);
            border: none;
        }

        .tab-content.active {
            display: block;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 팝업 모달 스타일 (이동 및 크기/투명도 애니메이션) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background-color: #fff;
            width: 90%;
            max-width: 650px;
            height: 80%;
            max-height: 450px;
            border-radius: 10px;
            position: relative;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            overflow: hidden;

            transform-origin: center;
            transform: translate(45vw, -45vh) scale(0);
            opacity: 0;
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.4s ease;
        }

        .modal-overlay.show .modal-content {
            transform: translate(0, 0) scale(1);
            opacity: 1;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 28px;
            font-weight: bold;
            color: #333;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 10000;
        }

        .close-btn:hover {
            color: #ff0000;
        }

        .modal-iframe {
            width: 100%;
            height: 100%;
            border: none;
            padding-top: 20px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div id="popupModal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn" onclick="toggleNotice()">&times;</button>
            <iframe src="notice.html" class="modal-iframe"></iframe>
        </div>
    </div>

    <div class="tab-bar">
        <button class="tab-button active" onclick="openTab(event, 'site1')">from Claude</button>
        <button class="tab-button" onclick="openTab(event, 'site2')">from GPT</button>
        <button class="tab-button" onclick="openTab(event, 'site3')">from Gemini</button>
        <button class="tab-button" onclick="openTab(event, 'site4')">from chatHK (w.Claude)</button>
        
        <button class="notice-bell-btn" id="bellBtn" onclick="toggleNotice()" title="공지사항 보기">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
            </svg>
        </button>
    </div>

    <div id="site1" class="tab-content active">
        <iframe src="site1.html"></iframe>
    </div>

    <div id="site2" class="tab-content">
        <iframe src="site2.html"></iframe>
    </div>

    <div id="site3" class="tab-content">
        <iframe src="site3.html"></iframe>
    </div>

    <div id="site4" class="tab-content">
        <iframe src="site4.html"></iframe>
    </div>

    <script>
        // 페이지가 처음 열릴 때 애니메이션과 함께 팝업 띄우기
        window.onload = function() {
            setTimeout(function() {
                document.getElementById('popupModal').classList.add('show');
            }, 100); 
        };

        // 탭 전환 함수
        function openTab(evt, tabId) {
            const contents = document.getElementsByClassName("tab-content");
            for (let i = 0; i < contents.length; i++) {
                contents[i].classList.remove("active");
            }

            const buttons = document.getElementsByClassName("tab-button");
            for (let i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove("active");
            }

            document.getElementById(tabId).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        // --- 공지사항 팝업 열기/닫기 토글 및 종 흔들기 함수 ---
        function toggleNotice() {
            const modal = document.getElementById('popupModal');
            const bell = document.getElementById('bellBtn');
            
            // 팝업이 열려있는 상태에서 닫기를 누른 경우
            if (modal.classList.contains('show')) {
                modal.classList.remove('show'); // 팝업 닫기
                
                // 종 애니메이션 클래스 추가 (강제 실행)
                bell.classList.add('active-ring');
                
                // 애니메이션 시간(0.8초)이 끝난 후 클래스 제거하여 초기화
                setTimeout(() => {
                    bell.classList.remove('active-ring');
                }, 800);
            } 
            // 팝업이 닫혀있는 상태에서 열기를 누른 경우
            else {
                modal.classList.add('show'); // 팝업 열기
            }
        }
    </script>

</body>
</html>
