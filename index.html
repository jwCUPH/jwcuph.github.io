<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>통합 웹사이트 관리</title>
    <style>
        /* 전체 페이지 레이아웃 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
            overflow: hidden; /* 스크롤 중복 방지 */
        }

        /* 탭 버튼이 들어가는 상단 바 */
        .tab-bar {
            display: flex;
            background-color: #333;
            padding: 10px 10px 0 10px;
        }

        .tab-button {
            padding: 10px 25px;
            cursor: pointer;
            border: none;
            outline: none;
            background-color: #555;
            color: white;
            border-radius: 8px 8px 0 0;
            margin-right: 5px;
            transition: 0.3s;
        }

        .tab-button:hover {
            background-color: #777;
        }

        .tab-button.active {
            background-color: #fff;
            color: #000;
            font-weight: bold;
        }

        /* iframe이 들어가는 컨텐츠 영역 */
        .tab-content {
            display: none;
            width: 100%;
            height: calc(100vh - 50px); /* 상단 바 높이 제외 */
            border: none;
        }

        .tab-content.active {
            display: block;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="tab-bar">
        <button class="tab-button active" onclick="openTab(event, 'site1')">from Claude</button>
        <button class="tab-button" onclick="openTab(event, 'site2')">from GPT</button>
    </div>

    <div id="site1" class="tab-content active">
        <iframe src="site1.html"></iframe>
    </div>

    <div id="site2" class="tab-content">
        <iframe src="site2.html"></iframe>
    </div>

    <script>
        function openTab(evt, tabId) {
            // 모든 탭 컨텐츠 숨기기
            const contents = document.getElementsByClassName("tab-content");
            for (let i = 0; i < contents.length; i++) {
                contents[i].classList.remove("active");
            }

            // 모든 탭 버튼 비활성화
            const buttons = document.getElementsByClassName("tab-button");
            for (let i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove("active");
            }

            // 선택한 탭만 보이기
            document.getElementById(tabId).classList.add("active");
            evt.currentTarget.classList.add("active");
        }
    </script>

</body>
</html>
